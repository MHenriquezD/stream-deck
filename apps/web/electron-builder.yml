appId: com.streamdeck.app
productName: Stream Deck

directories:
  output: ../../release
  buildResources: build

asar: false

win:
  target:
    - nsis
    - portable
  icon: icon.ico

nsis:
  oneClick: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Stream Deck
  installerIcon: icon.ico
  uninstallerIcon: icon.ico

portable:
  artifactName: ${productName}-${version}-portable.exe

files:
  - from: dist
    to: dist
    filter:
      - "**/*"
  
  - electron-main.mjs
  - preload.cjs
  - package.json
  
  - from: public
    to: public
    filter:
      - "**/*"

extraResources:
  # Solo el bundle del backend
  - from: ../server/dist
    to: backend
    filter:
      - "**/*"