appId: com.spartanhub.app
productName: Spartan Hub

directories:
  output: ../../release
  buildResources: build

asar: false

win:
  target:
    - nsis
    - portable
  icon: icon.ico

nsis:
  oneClick: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Spartan Hub
  installerIcon: icon.ico
  uninstallerIcon: icon.ico

portable:
  artifactName: ${productName}-${version}-portable.exe

files:
  # ⭐ Frontend completo (incluye todos los assets)
  - from: dist
    to: dist
    filter:
      - "**/*"
  
  # Electron files
  - electron-main.mjs
  - preload.cjs
  - package.json
  
  # ⭐ Public assets (si tienes archivos que no pasan por Vite)
  - from: public
    to: public
    filter:
      - "**/*"

extraResources:
  # Backend
  - from: ../server/dist
    to: backend
    filter:
      - "**/*"