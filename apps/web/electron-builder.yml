appId: com.spartanhub.app
productName: Spartan Hub

directories:
  output: ../../release
  buildResources: build

asar: false

win:
  target:
    - nsis
    - portable
  icon: icon.ico

nsis:
  oneClick: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Spartan Hub
  installerIcon: icon.ico
  uninstallerIcon: icon.ico

portable:
  artifactName: ${productName}-${version}-portable.exe

files:
  # ⭐ Frontend completo (incluye todos los assets)
  - from: dist
    to: dist
    filter:
      - "**/*"
  
  # Electron files
  - electron-main.mjs
  - preload.cjs
  - package.json
  
  # ⭐ Public assets (si tienes archivos que no pasan por Vite)
  - from: public
    to: public
    filter:
      - "**/*"

extraResources:
  # Backend
  - from: ../server/dist
    to: backend
    filter:
      - "**/*"
  # Native modules (flat node_modules prepared by scripts/prepare-native-deps.js)
  - from: ../server/native_modules/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  # Data folder (solo estructura — JSONs y cache se crean en runtime)
  - from: ../server/data
    to: backend/data
    filter:
      - "**/*"
      - "!*.json"
      - "!audio-helper.ps1"
      - "!app-icons/**"
      - "!custom-icons/**"